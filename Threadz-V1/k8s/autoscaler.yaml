apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: threadz-backend-hpa
  namespace: threadz
  labels:
    app: threadz-backend
    component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: threadz-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: threadz-frontend-hpa
  namespace: threadz
  labels:
    app: threadz-frontend
    component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: threadz-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: threadz-backend-vpa
  namespace: threadz
  labels:
    app: threadz-backend
    component: vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: threadz-backend
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: threadz-backend
      maxAllowed:
        cpu: 1000m
        memory: 2Gi
      minAllowed:
        cpu: 100m
        memory: 128Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: threadz-backend-pdb
  namespace: threadz
  labels:
    app: threadz-backend
    component: pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: threadz-backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: threadz-frontend-pdb
  namespace: threadz
  labels:
    app: threadz-frontend
    component: pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: threadz-frontend
